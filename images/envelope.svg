<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 520" fill="none">
  <defs>
    <linearGradient id="envPaper" x1="200" y1="40" x2="200" y2="500" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#fffefb"/>
      <stop offset="55%" stop-color="#fdf8f9"/>
      <stop offset="100%" stop-color="#f5eaee"/>
    </linearGradient>
    <linearGradient id="envShadow" x1="80" y1="260" x2="340" y2="460" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#e8d4dc" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#c9a8b4" stop-opacity="0.45"/>
    </linearGradient>
    <radialGradient id="waxSeal" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#a82848"/>
      <stop offset="70%" stop-color="#8b1a3a"/>
      <stop offset="100%" stop-color="#5c0f22"/>
    </radialGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#8b1a3a" flood-opacity="0.22"/>
    </filter>
  </defs>
  <!-- Bottom pocket -->
  <path d="M48 200 L200 320 L352 200 L352 472 Q352 488 336 488 L64 488 Q48 488 48 472 Z" fill="url(#envPaper)" stroke="#e8ccd6" stroke-width="1.5"/>
  <path d="M48 200 L200 320 L352 200" stroke="#dcb8c4" stroke-width="1.2" stroke-linecap="round"/>
  <!-- Inner shading -->
  <path d="M72 220 L200 318 L328 220 L328 460 H72 Z" fill="url(#envShadow)" opacity="0.65"/>
  <!-- Top flap (visual upper half of asset  hinge ~ y=200 area in fold design) -->
  <path d="M48 200 L200 72 L352 200 L200 320 Z" fill="#fffefb" stroke="#e8ccd6" stroke-width="1.5" filter="url(#softShadow)"/>
  <path d="M48 200 L200 72 L352 200" stroke="#dcb8c4" stroke-width="1"/>
  <!-- Wax seal -->
  <circle cx="200" cy="278" r="46" fill="url(#waxSeal)" stroke="#6b1428" stroke-width="1.5"/>
  <ellipse cx="200" cy="278" rx="34" ry="26" fill="none" stroke="rgba(255,255,255,0.22)" stroke-width="2"/>
  <path d="M188 268 Q200 262 212 268" stroke="rgba(255,255,255,0.35)" stroke-width="1.5" stroke-linecap="round" fill="none"/>
</svg>
